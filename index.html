<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Game</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .app {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }

    #gl-canvas {
      display: block;
      width: 800px;
      height: 600px;
    }

    .debug-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: white;
    }

    .debug-panel h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      white-space: break-spaces;
    }
  </style>

  <script type="module" src="index.ts"></script>
</head>

<body>
  <div class="app">
    <canvas id="gl-canvas" width="800" height="600"></canvas>

    <div class="debug-panel">
      <h1 id="command-pressed"></h1>
      <h1 id="offset-x"></h1>
      <h1 id="offset-y"></h1>
    </div>
  </div>
</body>

</html>
